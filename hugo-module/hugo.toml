# Default configuration for the static-agent Hugo module.
# Site owners can override any of these in their own hugo.toml
# under [params.staticAgent].

[params.staticAgent]
  enabled = true
  indexUrl = "/static-agent/index.bin"
  position = "bottom-right"
  theme = "auto"

[module]
  [module.hugoVersion]
    min = "0.110.0"
