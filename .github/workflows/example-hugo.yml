name: Example Hugo Site Build

on:
  workflow_dispatch:

jobs:
  build-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Eddie index into Hugo static/
        run: npx -y @jt55401/eddie-cli@latest index --cms hugo --content-dir content/ --output static/eddie/index.ed

      - name: Build Hugo site
        run: hugo --minify

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: public/
